<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงทะเบียนอบรม BLS - RJRH TRAINING CENTER</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #071f54; --accent: #1976d2; }
        body { font-family: 'Sarabun', sans-serif; background-color: #f0f4f8; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .reg-card { width: 100%; max-width: 600px; padding: 40px; border-radius: 24px; background: #ffffff; box-shadow: 0 20px 60px rgba(7,31,84,0.1); border: 1px solid rgba(7, 31, 84, 0.05); }
        .form-label { font-weight: 600; color: var(--primary); }
        .form-control-lg, .form-select-lg { border-radius: 12px; font-size: 1rem; background-color: #f8fafc; }
        .form-control-lg:focus, .form-select-lg:focus { border-color: var(--accent); box-shadow: 0 0 0 0.25rem rgba(25, 118, 210, 0.1); }
        .btn-reg { background-color: var(--primary); color: #ffffff; font-weight: 700; padding: 14px; border-radius: 12px; transition: all 0.25s ease; }
        .btn-reg:hover { background-color: #031233; color: #ffffff; transform: translateY(-1px); }
        .custom-prefix-box { display: none; transition: all 0.3s ease; }
    </style>
</head>
<body>

<div class="reg-card">
    <div class="text-center mb-4">
        <img src="https://cpiwdnbcuotmhtbhuzce.supabase.co/storage/v1/object/public/picture/LOGO_RJRH.png" alt="RJRH Logo" style="height: 100px; object-fit: contain;">
        <h4 class="fw-bold text-primary mt-3">ลงทะเบียนเข้าร่วมฝึกอบรม</h4>
        <p class="text-muted small">หลักสูตรการช่วยชีวิตขั้นพื้นฐาน Basic Life Support (CPR/AED)</p>
    </div>

    <form id="regForm" onsubmit="handleRegistration(event)">
        <div class="mb-3">
            <label class="form-label">เลือกรอบโครงการที่ต้องการเรียน</label>
            <select id="sessionSelect" class="form-select form-select-lg" required onchange="checkQuotaVisibility()">
                <option value="">-- กำลังโหลดรายการรอบอบรม... --</option>
            </select>
            <div id="quotaFeedback" class="form-text fw-bold text-success mt-1" style="display: none;"></div>
        </div>

        <div class="row">
            <div class="col-sm-4 col-12 mb-3">
                <label class="form-label">คำนำหน้าชื่อ</label>
                <select id="prefix" class="form-select form-select-lg" required onchange="toggleCustomPrefixInput()">
                    <option value="นาย">นาย</option>
                    <option value="นางสาว">นางสาว</option>
                    <option value="นาง">นาง</option>
                    <option value="OTHER">อื่นๆ (ระบุ)</option>
                </select>
            </div>
            
            <div class="col-sm-4 col-12 mb-3 custom-prefix-box" id="customPrefixWrapper">
                <label class="form-label">ระบุคำนำหน้าชื่อ</label>
                <input type="text" id="customPrefix" class="form-control form-control-lg" placeholder="เช่น นพ. / พญ. / ร.ต.อ.">
            </div>

            <div class="col mb-3">
                <label class="form-label">ชื่อ - นามสกุล (ภาษาไทย)</label>
                <input type="text" id="fullNameTH" class="form-control form-control-lg" placeholder="สมชาย ใจดี" required>
                <div class="form-text text-muted small">* โปรดตรวจสอบตัวสะกดเพื่อใช้พิมพ์บนวุฒิบัตร</div>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">เบอร์โทรศัพท์มือถือ</label>
            <input type="tel" id="phone" class="form-control form-control-lg" placeholder="0812345678" pattern="^[0-9]{9,10}$" required>
        </div>

        <div class="mb-4">
            <label class="form-label">อีเมล (E-mail)</label>
            <input type="email" id="email" class="form-control form-control-lg" placeholder="example@gmail.com" required>
            <div class="form-text text-danger fw-bold small mt-1"><i class="fas fa-exclamation-circle me-1"></i> รองรับเฉพาะบัญชีอีเมล @gmail.com เท่านั้น</div>
        </div>

        <div class="mb-4 bg-light p-3 rounded-3 border">
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="photoConsent" checked>
                <label class="form-check-input-label small text-dark fw-medium" for="photoConsent">
                    ยินยอมให้เจ้าหน้าที่บันทึกภาพถ่าย/วิดีโอระหว่างกิจกรรมอบรมเพื่อใช้ในการประชาสัมพันธ์หลักสูตร (PDPA)
                </label>
            </div>
        </div>

        <button type="submit" id="btnSubmit" class="btn btn-reg w-100 btn-lg shadow-sm">
            <i class="fas fa-paper-plane me-2"></i> ส่งข้อมูลลงทะเบียนเรียน
        </button>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    const SUPABASE_URL = "https://cpiwdnbcuotmhtbhuzce.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNwaXdkbmJjdW90bWh0Ymh1emNlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1NDY4NTMsImV4cCI6MjA5NjEyMjg1M30.7QU1FwPgIElugv4B6i23tYmmC60LG0wc8896EHTKXUc";
    
    const MAIN_REG_API_URL = "https://script.google.com/macros/s/AKfycbw-U9InsFm7MlEWzlaeNIhfYlJuiqVF3uSPNJcrJgpNtZp54805YOiW9pJ-B6EDXQ0/exec";
    
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let activeSessions = [];

    window.addEventListener('DOMContentLoaded', async () => { await loadActiveSessions(); });

    function toggleCustomPrefixInput() {
        const prefixSelect = document.getElementById('prefix');
        const customWrapper = document.getElementById('customPrefixWrapper');
        const customInput = document.getElementById('customPrefix');

        if (prefixSelect.value === 'OTHER') {
            customWrapper.style.display = 'block';
            customInput.required = true;
            customInput.focus();
        } else {
            customWrapper.style.display = 'none';
            customInput.required = false;
            customInput.value = '';
        }
    }

    function formatThaiDateDisplay(dateStr, timeStr) {
        if (!dateStr) return "";
        try {
            const dateParts = dateStr.split("-");
            if (dateParts.length !== 3) return dateStr;
            const day = parseInt(dateParts[2], 10);
            const monthIndex = parseInt(dateParts[1], 10) - 1;
            const yearBe = parseInt(dateParts[0], 10) + 543;
            const thaiMonths = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
            return `${day} ${thaiMonths[monthIndex]} ${yearBe} (${timeStr || 'เต็มวัน'})`;
        } catch (e) { return dateStr; }
    }

    async function loadActiveSessions() {
        const selectEl = document.getElementById('sessionSelect');
        try {
            const { data: sessions, error } = await supabaseClient.from('sessions').select('*').eq('status', 'Active').eq('course_key', 'BLS').order('training_date', { ascending: true });
            if (error) throw error;
            if (!sessions || sessions.length === 0) {
                selectEl.innerHTML = '<option value="">-- ขออภัย ขณะนี้ไม่มีรอบอบรมที่เปิดรับสมัคร --</option>';
                document.getElementById('btnSubmit').disabled = true;
                return;
            }
            activeSessions = sessions;
            selectEl.innerHTML = '<option value="">-- กรุณาเลือกรอบอบรมเรียน BLS --</option>';
            sessions.forEach(s => {
                const localDisplayDate = formatThaiDateDisplay(s.training_date, s.training_time);
                if (s.available_seats > 0) {
                    selectEl.innerHTML += `<option value="${s.id}">[รอบเรียน] ${s.name} - วันที่ ${localDisplayDate}</option>`;
                } else {
                    selectEl.innerHTML += `<option value="${s.id}" disabled>[เต็มแล้ว] ${s.name} - วันที่ ${localDisplayDate}</option>`;
                }
            });
        } catch (e) { console.error(e); selectEl.innerHTML = '<option value="">-- โหลดข้อมูลรอบอบรมล้มเหลว --</option>'; }
    }

    function checkQuotaVisibility() {
        const sessionId = document.getElementById('sessionSelect').value;
        const feedback = document.getElementById('quotaFeedback');
        if (!sessionId) { feedback.style.display = 'none'; return; }
        const selected = activeSessions.find(item => String(item.id) === String(sessionId));
        if (selected) {
            feedback.style.display = 'block';
            feedback.innerText = `ว่างอีก: ${selected.available_seats} จาก ${selected.max_seats} ที่นั่ง`;
        }
    }

    async function handleRegistration(e) {
        e.preventDefault();
        const btn = document.getElementById('btnSubmit');
        const emailInput = document.getElementById('email').value.trim();
        const sessionId = document.getElementById('sessionSelect').value;
        const selectedSession = activeSessions.find(item => String(item.id) === String(sessionId));

        if (!selectedSession) return;
        
        if (!emailInput.toLowerCase().endsWith('@gmail.com')) {
            Swal.fire('รูปแบบอีเมลไม่ถูกต้อง', 'ขออภัยครับ ระบบฝึกอบรมนี้เปิดให้ลงทะเบียนและรับใบประกาศผ่านอีเมลบัญชีของ @gmail.com เท่านั้นครับ', 'warning');
            return;
        }

        const prefixSelectValue = document.getElementById('prefix').value;
        const finalPrefix = prefixSelectValue === 'OTHER' 
            ? document.getElementById('customPrefix').value.trim() 
            : prefixSelectValue;

        if (!finalPrefix) {
            Swal.fire('ระบุข้อมูลไม่ครบถ้วน', 'กรุณาระบุคำนำหน้าชื่อของท่านด้วยครับ', 'warning');
            return;
        }

        const fullInsertedName = `${finalPrefix}${document.getElementById('fullNameTH').value.trim()}`;

        const confirmDialog = await Swal.fire({
            title: 'โปรดตรวจสอบชื่อสำหรับพิมพ์วุฒิบัตร',
            html: `ชื่อ-นามสกุลที่ท่านกรอกคือ:<br><b class="text-primary fs-4">${fullInsertedName}</b><br><br>อีเมลสำหรับรับวุฒิบัตร:<br><b class="text-success fs-5">${emailInput}</b><br><br><span class="text-danger fw-bold">* หากระบบออกวุฒิบัตรแล้ว จะไม่สามารถแก้ไขชื่อในภายหลังได้</span>`,
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#071f54',
            cancelButtonColor: '#aaa',
            confirmButtonText: 'ยืนยัน ข้อมูลถูกต้อง',
            cancelButtonText: 'กลับไปแก้ไข'
        });

        if (!confirmDialog.isConfirmed) return;

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>กำลังประมวลผลข้อมูลการสมัคร...';

        const uniqueId = Math.floor(10000000 + Math.random() * 90000000);

        let genMatch = selectedSession.name.match(/รุ่นที่\s*(\d+)/) || selectedSession.name.match(/รุ่น\s*(\d+)/);
        let extractedGenNo = genMatch ? genMatch[1] : "1";

        const payload = {
            action: "registerOnline",
            id: uniqueId,
            genNo: extractedGenNo, 
            prefix: finalPrefix, 
            fullNameTH: document.getElementById('fullNameTH').value.trim(),
            phone: document.getElementById('phone').value.trim(),
            email: emailInput,
            sessionName: selectedSession.name,
            trainingDate: selectedSession.training_date, 
            trainingTime: selectedSession.training_time, 
            courseKey: "BLS",
            photoConsent: document.getElementById('photoConsent').checked
        };

        try {
            await fetch(MAIN_REG_API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: "postData=" + encodeURIComponent(JSON.stringify(payload))
            });

            const currentAvailable = selectedSession.available_seats - 1;
            await supabaseClient.from('sessions').update({ available_seats: currentAvailable }).eq('id', selectedSession.id);

            Swal.fire({
                title: 'ลงทะเบียนสำเร็จ!',
                html: `รหัสลงทะเบียนของคุณคือ: <b class="text-danger fs-4">${uniqueId}</b><br><br>ระบบทำการส่ง QR Code สำหรับรายงานตัวเข้าสู่กล่องข้อความอีเมลเรียบร้อยแล้ว`,
                icon: 'success',
                confirmButtonColor: '#071f54',
                confirmButtonText: 'ตกลง'
            }).then(() => {
                document.getElementById('regForm').reset();
                document.getElementById('customPrefixWrapper').style.display = 'none'; 
                loadActiveSessions(); 
            });

        } catch (err) {
            console.error(err);
            Swal.fire('เกิดข้อผิดพลาด', 'ไม่สามารถเชื่อมต่อระบบลงทะเบียนได้ กรุณาลองใหม่อีกครั้ง', 'error');
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-paper-plane me-2"></i> ส่งข้อมูลลงทะเบียนเรียน';
        }
    }
</script>
</body>
</html>
